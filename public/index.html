<!-- ═══ ANTI-DEBUG & DEVTOOLS PROTECTION ═══ -->
<script>
(function() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode === 123) return false; // F12
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 'I' || e.keyCode === 'C' || e.keyCode === 'J')) return false;
        if (e.ctrlKey && e.keyCode === 'U') return false; // Ctrl+U
    };
    var threshold = 160;
    var check = function() {
      var widthThreshold = window.outerWidth - window.innerWidth > threshold;
      var heightThreshold = window.outerHeight - window.innerHeight > threshold;
      if (widthThreshold || heightThreshold) {
        document.body.innerHTML = '<h1 style="text-align:center;margin-top:40vh;color:red">Access Denied: DevTools Detected</h1>';
      }
    };
    setInterval(check, 1000);
})();
</script>
