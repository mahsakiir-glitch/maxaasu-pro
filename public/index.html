<body>
  <div class="bg-orbs"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div></div>

var hlsInstance=null,quotes=[{text:'Knowledge is the weapon of the wise',author:'Maxaas.u'},{text:'Stream. Learn. Dominate.',author:'Maxaas.u Pro'},{text:'The best investment is in yourself',author:'Maxaas.u'},{text:'Code is poetry in motion',author:'Maxaas.u'},{text:'Security is not a product, but a process',author:'Maxaas.u'},{text:'Every expert was once a beginner',author:'Maxaas.u Pro'},{text:'Learn today, lead tomorrow',author:'Maxaas.u'},{text:'The network is the battlefield',author:'Maxaas.u Pro'}],currentQuoteIndex=0,defaultMenuItems=[{id:'home',label:'Home',icon:'fa-house'},{id:'courses',label:'Courses',icon:'fa-graduation-cap'},{id:'audio',label:'Audio',icon:'fa-headphones'},{id:'news',label:'News',icon:'fa-newspaper'},{id:'contact',label:'Contact',icon:'fa-envelope'}];

var _navigating=false;
function init(){applyTheme(state.theme);renderSidebar();fetchSettings();navigateTo('home');startQuoteRotation();document.addEventListener('contextmenu',function(e){if(e.target.tagName==='VIDEO')e.preventDefault()});window.addEventListener('hashchange',function(){if(!_navigating){navigateTo(location.hash.replace('#','')||'home')}})}
function applyTheme(t){state.theme=t;document.documentElement.setAttribute('data-theme',t);localStorage.setItem('maxaas_theme',t);var i=t==='dark'?'fa-sun':'fa-moon',l=t==='dark'?'Light Mode':'Dark Mode';var e1=document.getElementById('themeIcon'),e2=document.getElementById('themeLabel'),e3=document.getElementById('mobileThemeIcon');if(e1)e1.className='fa-solid '+i;if(e2)e2.textContent=l;if(e3)e3.className='fa-solid '+i}
function toggleTheme(){applyTheme(state.theme==='dark'?'light':'dark')}
function renderSidebar(){var nav=document.getElementById('sidebarNav'),items=(state.settings&&state.settings.menu_items)?state.settings.menu_items:defaultMenuItems,html='';for(var i=0;i<items.length;i++){html+='<div class="nav-item '+(state.currentPage===items[i].id?'active':'')+'" onclick="navigateTo(\''+items[i].id+'\')"><i class="fa-solid '+items[i].icon+'"></i> '+items[i].label+'</div>'}if(state.token){html+='<div class="nav-item '+(state.currentPage==='admin'?'active':'')+'" onclick="navigateTo(\'admin\')"><i class="fa-solid fa-gauge-high"></i> Dashboard</div><div class="nav-item" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</div>'}else{html+='<div class="nav-item '+(state.currentPage==='signin'?'active':'')+'" onclick="navigateTo(\'signin\')"><i class="fa-solid fa-right-to-bracket"></i> Sign In</div>'}nav.innerHTML=html}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('active')}
function navigateTo(p,params){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('active');_navigating=true;state.currentPage=p;state.pageParams=params||{};location.hash=p;renderSidebar();renderPage();window.scrollTo({top:0,behavior:'smooth'});setTimeout(function(){_navigating=false},300)}
function renderPage(){var m=document.getElementById('mainContent');switch(state.currentPage){case'home':renderHomePage(m);break;case'courses':renderCoursesPage(m);break;case'audio':renderAudioPage(m);break;case'news':renderNewsPage(m);break;case'contact':renderContactPage(m);break;case'signin':renderSignInPage(m);break;case'admin':renderAdminPage(m);break;case'video':renderVideoPlayerPage(m);break;case'course-detail':renderCourseDetailPage(m);break;default:renderHomePage(m)}}

function apiFetch(endpoint,options){options=options||{};var url=API+endpoint;var headers={'Content-Type':'application/json'};if(state.token)headers['Authorization']='Bearer '+state.token;return fetch(url,{method:options.method||'GET',headers:headers,body:options.body||null}).then(function(res){var ct=res.headers.get('content-type')||'';if(ct.indexOf('application/json')===-1){throw new Error('BACKEND_OFFLINE')}return res.json()}).then(function(data){if(data&&data.error){if((data.error==='Invalid or expired token'||data.error==='Access token required')&&endpoint.indexOf('/admin')!==-1){state.token=null;localStorage.removeItem('maxaas_token');renderSidebar();navigateTo('signin')}throw new Error(data.error)}return data}).catch(function(err){if(err.message==='BACKEND_OFFLINE'||err.message==='Failed to fetch'){if(!state._offlineShown){state._offlineShown=true;showToast('Server not reachable','error');setTimeout(function(){state._offlineShown=false},10000)}}else if(err.message&&err.message!=='NOT_FOUND'&&err.message!=='BACKEND_OFFLINE'){showToast(err.message,'error')}throw err})}

function fetchSettings(){return apiFetch('/settings').then(function(d){state.settings=d||{};if(d&&d.menu_items)try{state.settings.menu_items=JSON.parse(d.menu_items).items}catch(e){}if(d&&d.site_name)document.title=d.site_name;if(d&&d.accent_color)document.documentElement.style.setProperty('--accent',d.accent_color);renderSidebar()}).catch(function(){renderSidebar()})}
function fetchVideos(){return apiFetch('/videos').then(function(d){state.videos=d||[]}).catch(function(){state.videos=[]})}
function fetchCategories(){return apiFetch('/categories').then(function(d){state.categories=d||[]}).catch(function(){state.categories=[]})}
function fetchPosts(){return apiFetch('/posts').then(function(d){state.posts=d||[]}).catch(function(){state.posts=[]})}
function fetchAudio(){return apiFetch('/audio').then(function(d){state.audioTracks=d||[]}).catch(function(){state.audioTracks=[]})}

function showToast(msg,type){var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast '+(type||'info');t.textContent=msg;c.appendChild(t);setTimeout(function(){if(t.parentNode)t.remove()},4000)}
function openModal(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modalOverlay').classList.add('active')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active')}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal()});
function startQuoteRotation(){setInterval(function(){var e=document.querySelector('.quote-text');if(!e)return;e.classList.add('fading');setTimeout(function(){currentQuoteIndex=(currentQuoteIndex+1)%quotes.length;e.textContent=quotes[currentQuoteIndex].text;var a=e.parentNode.querySelector('.quote-author');if(a)a.textContent=quotes[currentQuoteIndex].author;e.classList.remove('fading')},500)},3000)}
function timeAgo(d){if(!d)return'';var m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<1)return'Just now';if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';var dy=Math.floor(h/24);if(dy<30)return dy+'d ago';return new Date(d).toLocaleDateString()}
function formatViews(n){if(!n)return'0 views';if(n<1000)return n+' views';if(n<1000000)return(n/1000).toFixed(1)+'K views';return(n/1000000).toFixed(1)+'M views'}
function esc(s){if(!s)return'';var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
function getThumb(v){if(v.thumbnail)return v.thumbnail;var l=(v.title||'M')[0].toUpperCase();return'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect fill="#1a1a2e" width="320" height="180"/><text fill="#c8a44e" font-family="sans-serif" font-size="64" font-weight="bold" x="50%" y="50%" dominant-baseline="central" text-anchor="middle">'+l+'</text></svg>')}

function renderHomePage(c){c.innerHTML='<div class="page active"><div id="featuredArea"></div><div class="quote-section"><div class="quote-text">'+quotes[currentQuoteIndex].text+'</div><div class="quote-author">'+quotes[currentQuoteIndex].author+'</div></div><div id="coursesSection"></div><div id="standaloneSection"></div></div>';Promise.all([fetchVideos(),fetchCategories()]).then(function(){var f=null;for(var i=0;i<state.videos.length;i++){if(state.videos[i].is_featured){f=state.videos[i];break}}if(!f&&state.videos.length>0)f=state.videos[0];if(f)document.getElementById('featuredArea').innerHTML='<div class="featured-section"><div class="featured-player glass" style="padding:0;cursor:pointer;position:relative" onclick="playVideo(\''+f.id+'\')"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#0d0d14;border-radius:var(--radius);position:relative"><img src="'+getThumb(f)+'" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius);opacity:.6"><div style="position:absolute"><div style="width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px var(--accent-glow)"><i class="fa-solid fa-play" style="color:#fff;font-size:1.6rem;margin-left:4px"></i></div></div></div></div><div class="featured-info"><h2>'+esc(f.title)+'</h2><p>'+esc(f.description||'')+' &middot; '+formatViews(f.views)+' &middot; '+f.duration+'</p></div></div>';if(state.categories.length>0){var ch='<div class="section-header"><h3>Courses</h3><a onclick="navigateTo(\'courses\')" style="cursor:pointer">View All</a></div><div class="video-grid">';for(var j=0;j<state.categories.length&&j<4;j++){var cat=state.categories[j],cnt=0;for(var k=0;k<state.videos.length;k++)if(state.videos[k].category_id===cat.id)cnt++;ch+='<div class="video-card glass glass-hover" onclick="navigateTo(\'course-detail\',{categoryId:\''+cat.id+'\'})"><div class="video-card-thumb" style="display:flex;align-items:center;justify-content:center"><i class="fa-solid '+(cat.icon||'fa-folder')+'" style="font-size:2.5rem;color:var(--accent)"></i></div><div class="video-card-body"><h4>'+esc(cat.name)+'</h4><div class="video-card-meta"><span>'+cnt+' episode'+(cnt!==1?'s':'')+'</span></div></div></div>'}ch+='</div>';document.getElementById('coursesSection').innerHTML=ch}var st=[];for(var m=0;m<state.videos.length;m++)if(!state.videos[m].category_id&&!state.videos[m].is_featured)st.push(state.videos[m]);if(st.length>0){var sh='<div class="section-header"><h3>Latest Videos</h3></div><div class="video-grid">';for(var n=0;n<st.length&&n<8;n++){var v=st[n];sh+='<div class="video-card glass glass-hover" onclick="playVideo(\''+v.id+'\')"><div class="video-card-thumb"><img src="'+getThumb(v)+'" loading="lazy"><span class="video-card-duration">'+v.duration+'</span></div><div class="video-card-body"><h4>'+esc(v.title)+'</h4><div class="video-card-meta"><span>'+formatViews(v.views)+'</span></div></div></div>'}sh+='</div>';document.getElementById('standaloneSection').innerHTML=sh}})}

function renderCoursesPage(c){c.innerHTML='<div class="page active"><h1 class="page-title">Courses</h1><p class="page-subtitle">Structured learning paths</p><div id="cc"></div></div>';Promise.all([fetchCategories(),fetchVideos()]).then(function(){var h='<div class="category-chips"><div class="chip '+(!state.selectedCategory?'active':'')+'" onclick="state.selectedCategory=null;renderCoursesPage(document.getElementById(\'mainContent\'))">All</div>';for(var i=0;i<state.categories.length;i++)h+='<div class="chip '+(state.selectedCategory===state.categories[i].id?'active':'')+'" onclick="state.selectedCategory=\''+state.categories[i].id+'\';renderCoursesPage(document.getElementById(\'mainContent\'))">'+esc(state.categories[i].name)+'</div>';h+='</div>';var fl=[];for(var j=0;j<state.videos.length;j++)if(!state.selectedCategory||state.videos[j].category_id===state.selectedCategory)fl.push(state.videos[j]);if(!fl.length)h+='<div class="empty-state"><i class="fa-solid fa-video-slash"></i><p>No videos found.</p></div>';else{h+='<div class="video-grid">';for(var k=0;k<fl.length;k++){var v=fl[k];h+='<div class="video-card glass glass-hover" onclick="playVideo(\''+v.id+'\')"><div class="video-card-thumb"><img src="'+getThumb(v)+'" loading="lazy"><span class="video-card-duration">'+v.duration+'</span></div><div class="video-card-body"><h4>'+esc(v.title)+'</h4><div class="video-card-meta"><span>'+formatViews(v.views)+'</span></div></div></div>'}h+='</div>'}document.getElementById('cc').innerHTML=h})}
function renderCourseDetailPage(c){var cid=state.pageParams.categoryId;Promise.all([fetchCategories(),fetchVideos()]).then(function(){var cat=null;for(var i=0;i<state.categories.length;i++)if(state.categories[i].id===cid)cat=state.categories[i];var vids=[];for(var j=0;j<state.videos.length;j++)if(state.videos[j].category_id===cid)vids.push(state.videos[j]);var h='<div class="page active"><div style="cursor:pointer;margin-bottom:16px" onclick="navigateTo(\'courses\')"><i class="fa-solid fa-arrow-left"></i> Back</div><h1 class="page-title">'+(cat?esc(cat.name):'Course')+'</h1><p class="page-subtitle">'+(cat?esc(cat.description||''):'')+'</p>';if(!vids.length)h+='<div class="empty-state"><i class="fa-solid fa-video-slash"></i><p>No episodes yet.</p></div>';else{h+='<div class="video-grid">';for(var k=0;k<vids.length;k++){var v=vids[k];h+='<div class="video-card glass glass-hover" onclick="playVideo(\''+v.id+'\')"><div class="video-card-thumb"><img src="'+getThumb(v)+'" loading="lazy"><span class="video-card-duration">'+v.duration+'</span></div><div class="video-card-body"><h4>'+esc(v.title)+'</h4><div class="video-card-meta"><span>'+formatViews(v.views)+'</span></div></div></div>'}h+='</div>'}h+='</div>';c.innerHTML=h})}
function renderAudioPage(c){c.innerHTML='<div class="page active"><h1 class="page-title">Audio</h1><p class="page-subtitle">Listen and learn</p><div id="ac"></div></div>';fetchAudio().then(function(){if(!state.audioTracks.length){document.getElementById('ac').innerHTML='<div class="empty-state"><i class="fa-solid fa-headphones"></i><p>No audio tracks yet.</p></div>';return}var h='<div class="audio-grid">';for(var i=0;i<state.audioTracks.length;i++){var t=state.audioTracks[i];h+='<div class="audio-card glass glass-hover" onclick="playAudio('+i+')"><div class="audio-cover">'+(t.cover_url?'<img src="'+t.cover_url+'">':'<i class="fa-solid fa-music"></i>')+'</div><h4>'+esc(t.title)+'</h4><p>'+esc(t.artist)+'</p></div>'}h+='</div>';document.getElementById('ac').innerHTML=h})}
function renderNewsPage(c){c.innerHTML='<div class="page active"><h1 class="page-title">News</h1><p class="page-subtitle">Latest updates</p><div id="nc"></div></div>';fetchPosts().then(function(){if(!state.posts.length){document.getElementById('nc').innerHTML='<div class="empty-state"><i class="fa-solid fa-newspaper"></i><p>No news yet.</p></div>';return}var h='<div class="news-feed">';for(var i=0;i<state.posts.length;i++){var p=state.posts[i];h+='<div class="news-bubble"><div class="news-avatar">'+(p.avatar?'<img src="'+p.avatar+'">':(p.author||'M')[0].toUpperCase())+'</div><div class="news-body"><div class="news-header"><span class="news-author">'+esc(p.author||'Maxaas.u Official')+'</span><span class="news-time">'+timeAgo(p.created_at)+'</span></div><div class="news-title">'+esc(p.title)+'</div><div class="news-content">'+esc(p.content)+'</div>'+(p.image_url?'<div class="news-image"><img src="'+p.image_url+'" loading="lazy"></div>':'')+'</div></div>'}h+='</div>';document.getElementById('nc').innerHTML=h})}

function renderContactPage(c){c.innerHTML='<div class="page active"><h1 class="page-title">Contact Us</h1><p class="page-subtitle">Send suggestions or report issues</p><div class="privacy-warning"><i class="fa-solid fa-triangle-exclamation"></i><p>Do not enter real names or personal numbers. Use an alias only.</p></div><div class="contact-form glass" style="padding:28px;max-width:560px"><div class="form-group"><label>Alias</label><input type="text" id="cAlias" class="form-input" maxlength="50"></div><div class="form-group"><label>Contact Method (Optional)</label><input type="text" id="cMethod" class="form-input" maxlength="100"></div><div class="form-group"><label>Type</label><select id="cType" class="form-select"><option value="suggestion">Suggestion</option><option value="report">Report</option><option value="broken_video">Broken Video</option><option value="new_request">New Request</option></select></div><div class="form-group"><label>Message</label><textarea id="cMsg" class="form-textarea" maxlength="2000"></textarea></div><button class="btn btn-primary" id="cBtn" onclick="submitContact()"><i class="fa-solid fa-paper-plane"></i> Send</button></div></div>'}
function submitContact(){var a=document.getElementById('cAlias').value.trim(),m=document.getElementById('cMethod').value.trim(),t=document.getElementById('cType').value,msg=document.getElementById('cMsg').value.trim();if(!a){showToast('Enter alias','error');return}if(!msg){showToast('Enter message','error');return}var btn=document.getElementById('cBtn');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Sending...';btn.disabled=true;apiFetch('/contacts',{method:'POST',body:JSON.stringify({alias_name:a,contact_method:m,message_type:t,message:msg})}).then(function(){showToast('Message sent!','success');document.getElementById('cAlias').value='';document.getElementById('cMethod').value='';document.getElementById('cMsg').value=''}).catch(function(){}).finally(function(){btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Send';btn.disabled=false})}

// ══════════════════════════════════════════════
// SIGN IN - PIN VERIFICATION (Only correct PIN activates button)

function renderSignInPage(c){if(state.token){navigateTo('admin');return}state._pinValid=false;c.innerHTML='<div class="page active"><div class="signin-card glass"><h2>Admin Sign In</h2><p class="subtitle">Access the dashboard</p><div class="form-group"><label>Username</label><input type="text" id="loginUser" class="form-input"></div><div class="form-group"><label>Password</label><input type="password" id="loginPass" class="form-input"></div><div class="form-group"><label>PIN (8 digits)</label><input type="password" id="loginPin" class="form-input" maxlength="8" oninput="verifyPinLive()"><div class="pin-status" id="pinStatus"></div></div><button class="btn btn-primary w-full" id="loginBtn" onclick="handleLogin()" disabled style="margin-top:8px;opacity:0.4"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button></div></div>';setTimeout(function(){var p=document.getElementById('loginPass');if(p)p.onkeydown=function(e){if(e.key==='Enter')handleLogin()};var pin=document.getElementById('loginPin');if(pin)pin.onkeydown=function(e){if(e.key==='Enter')handleLogin()}},100)}

var _pinCheckTimeout=null;
function verifyPinLive(){var pin=document.getElementById('loginPin').value;var btn=document.getElementById('loginBtn');var status=document.getElementById('pinStatus');if(pin.length<8){btn.disabled=true;btn.style.opacity='0.4';status.innerHTML='';state._pinValid=false;return}if(pin.length===8){status.innerHTML='<i class="fa-solid fa-spinner fa-spin" style="color:var(--muted)"></i> Verifying...';btn.disabled=true;btn.style.opacity='0.4';if(_pinCheckTimeout)clearTimeout(_pinCheckTimeout);_pinCheckTimeout=setTimeout(function(){var u=document.getElementById('loginUser').value.trim();if(!u){status.innerHTML='<span style="color:#dc3c3c"><i class="fa-solid fa-xmark"></i> Enter username first</span>';return}fetch(API+'/auth/check-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,pin:pin})}).then(function(r){return r.json()}).then(function(d){if(d.valid){state._pinValid=true;btn.disabled=false;btn.style.opacity='1';status.innerHTML='<span style="color:#28b464"><i class="fa-solid fa-check-circle"></i> PIN Verified</span>'}else{state._pinValid=false;btn.disabled=true;btn.style.opacity='0.4';status.innerHTML='<span style="color:#dc3c3c"><i class="fa-solid fa-xmark"></i> Invalid PIN</span>'}}).catch(function(){state._pinValid=false;btn.disabled=true;btn.style.opacity='0.4';status.innerHTML='<span style="color:#dc3c3c"><i class="fa-solid fa-xmark"></i> Verification failed</span>'})},500)}else{btn.disabled=true;btn.style.opacity='0.4';status.innerHTML='';state._pinValid=false}}

function handleLogin(){var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value,pin=document.getElementById('loginPin').value;if(!u||!p){showToast('Enter username and password','error');return}if(!state._pinValid){showToast('PIN verification required','error');return}var btn=document.getElementById('loginBtn');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';btn.disabled=true;apiFetch('/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p,pin:pin})}).then(function(d){state.token=d.token;state.user={username:d.username};localStorage.setItem('maxaas_token',d.token);showToast('Welcome, '+d.username,'success');renderSidebar();navigateTo('admin')}).catch(function(){}).finally(function(){btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Sign In';btn.disabled=!state._pinValid;btn.style.opacity=state._pinValid?'1':'0.4'})}

function signOut(){state.token=null;state.user=null;state._pinValid=false;localStorage.removeItem('maxaas_token');showToast('Signed out','info');renderSidebar();navigateTo('home')}

function renderVideoPlayerPage(c){var vid=state.pageParams.videoId;if(!vid){navigateTo('home');return}c.innerHTML='<div class="page active"><div style="cursor:pointer;margin-bottom:16px" onclick="navigateTo(\'home\')"><i class="fa-solid fa-arrow-left"></i> Back</div><div class="video-wrapper" style="position:relative"><video id="mainPlayer" style="width:100%;max-height:70vh;background:#000;border-radius:var(--radius);display:block" controls controlsList="nodownload" disablePictureInPicture playsinline preload="auto"></video></div><div class="player-page-info" id="playerInfo"><p class="text-muted">Loading video...</p></div></div>';if(hlsInstance){hlsInstance.destroy();hlsInstance=null}apiFetch('/stream-token/'+vid).then(function(td){var streamUrl=API+td.streamUrl;var video=null;for(var i=0;i<state.videos.length;i++)if(state.videos[i].id===vid)video=state.videos[i];if(video)document.getElementById('playerInfo').innerHTML='<h2 style="font-family:var(--font-display);font-weight:700;font-size:1.4rem;margin-bottom:8px">'+esc(video.title)+'</h2><p class="text-muted">'+esc(video.description||'')+'</p><div style="display:flex;gap:16px;margin-top:12px;color:var(--muted);font-size:.85rem"><span><i class="fa-solid fa-eye"></i> '+formatViews(video.views)+'</span><span><i class="fa-solid fa-clock"></i> '+video.duration+'</span></div>';else document.getElementById('playerInfo').innerHTML='<h2>Now Playing</h2>';var ve=document.getElementById('mainPlayer');ve.addEventListener('contextmenu',function(e){e.preventDefault()});var vtype=td.video_type||'mp4';if(vtype==='m3u8'){if(typeof Hls!=='undefined'&&Hls.isSupported()){hlsInstance=new Hls({enableWorker:true});hlsInstance.loadSource(streamUrl);hlsInstance.attachMedia(ve);hlsInstance.on(Hls.Events.MANIFEST_PARSED,function(){ve.play().catch(function(){})});hlsInstance.on(Hls.Events.ERROR,function(event,data){if(data.fatal){showToast('HLS stream error','error')}})}else if(ve.canPlayType('application/vnd.apple.mpegurl')){ve.src=streamUrl;ve.play().catch(function(){})}else{document.getElementById('playerInfo').innerHTML+='<p style="color:#dc3c3c;margin-top:12px">HLS not supported.</p>'}}else{ve.src=streamUrl;ve.addEventListener('error',function(){document.getElementById('playerInfo').innerHTML+='<p style="color:#dc3c3c;margin-top:12px"><i class="fa-solid fa-circle-exclamation"></i> Video failed to load.</p>'});ve.play().catch(function(){})}}).catch(function(){document.getElementById('playerInfo').innerHTML='<p style="color:#dc3c3c">Failed to load video.</p>'})}
function playVideo(id){state.pageParams={videoId:id};navigateTo('video')}

function playAudio(idx){if(!state.audioTracks.length)return;state.currentAudioIndex=idx;var t=state.audioTracks[idx];document.getElementById('miniPlayer').classList.add('active');document.getElementById('miniPlayerTitle').textContent=t.title;document.getElementById('miniPlayerArtist').textContent=t.artist;var cv=document.getElementById('miniPlayerCover');cv.innerHTML=t.cover_url?'<img src="'+t.cover_url+'">':'<i class="fa-solid fa-music"></i>';apiFetch('/audio-token/'+t.id).then(function(d){audioEl.src=API+d.streamUrl;audioEl.play();state.audioPlaying=true;document.getElementById('audioPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>'}).catch(function(){showToast('Failed to load audio','error')})}
function audioToggle(){if(audioEl.paused){audioEl.play();state.audioPlaying=true;document.getElementById('audioPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>'}else{audioEl.pause();state.audioPlaying=false;document.getElementById('audioPlayBtn').innerHTML='<i class="fa-solid fa-play"></i>'}}

function markAllRead(){apiFetch('/admin/contacts').then(function(cs){var ps=[];for(var i=0;i<(cs||[]).length;i++)if(!cs[i].is_read)ps.push(apiFetch('/admin/contacts/'+cs[i].id,{method:'PUT',body:JSON.stringify({is_read:true})}));return Promise.all(ps)}).then(function(){showToast('All read','success');switchTab('inbox')}).catch(function(){})}
function delContact(cid){if(!confirm('Delete?'))return;apiFetch('/admin/contacts/'+cid,{method:'DELETE'}).then(function(){showToast('Deleted','success');closeModal();switchTab('inbox')}).catch(function(){})}

function renderAdminSettings(p){apiFetch('/settings').then(function(s){s=s||{};p.innerHTML='<div class="admin-card glass"><h3><i class="fa-solid fa-gear"></i> Settings</h3><div class="form-group"><label>Site Name</label><input type="text" id="smName" class="form-input" value="'+esc(s.site_name||'Maxaas.u Pro')+'"></div><div class="form-group"><label>Description</label><input type="text" id="smDesc" class="form-input" value="'+esc(s.site_description||'')+'"></div><div class="form-group"><label>Accent Color</label><div style="display:flex;gap:12px;align-items:center"><input type="color" id="smColor" value="'+(s.accent_color||'#c8a44e')+'" style="width:48px;height:36px;border:none;cursor:pointer;border-radius:6px"><input type="text" id="smColorText" class="form-input" value="'+(s.accent_color||'#c8a44e')+'" style="flex:1"></div></div><button class="btn btn-primary" onclick="saveSettings()"><i class="fa-solid fa-save"></i> Save</button></div>';document.getElementById('smColor').oninput=function(e){document.getElementById('smColorText').value=e.target.value};document.getElementById('smColorText').oninput=function(e){try{document.getElementById('smColor').value=e.target.value}catch(err){}}})}
function saveSettings(){apiFetch('/admin/settings',{method:'PUT',body:JSON.stringify({site_name:document.getElementById('smName').value.trim(),site_description:document.getElementById('smDesc').value.trim(),accent_color:document.getElementById('smColorText').value.trim()})}).then(function(){showToast('Settings saved','success');fetchSettings()}).catch(function(){})}

function renderAdminSecurity(p){p.innerHTML='<div class="admin-card glass"><h3><i class="fa-solid fa-lock"></i> Security</h3><p class="text-muted mb-4" style="line-height:1.7">Change your credentials. <strong>Old credentials will be permanently replaced.</strong></p><div style="padding:16px;background:rgba(220,60,60,0.08);border:1px solid rgba(220,60,60,0.2);border-radius:var(--radius-sm);margin-bottom:20px"><p style="font-size:.85rem;color:#dc3c3c;font-weight:600"><i class="fa-solid fa-triangle-exclamation"></i> After changing, sign in with new credentials.</p></div><div class="form-group"><label>Current PIN (Required)</label><input type="password" id="secPin" class="form-input" maxlength="8" placeholder="Current 8-digit PIN"></div><hr style="border:none;border-top:1px solid var(--border);margin:20px 0"><div class="form-group"><label>New Username</label><input type="text" id="secUser" class="form-input" placeholder="Leave empty to keep"></div><div class="form-group"><label>New Password</label><input type="password" id="secPass" class="form-input" placeholder="Leave empty to keep"></div><div class="form-group"><label>New PIN (8 digits)</label><input type="password" id="secNewPin" class="form-input" maxlength="8" placeholder="Leave empty to keep"></div><button class="btn btn-primary" onclick="updateCreds()"><i class="fa-solid fa-shield-halved"></i> Update Credentials</button></div>'}
function updateCreds(){var pin=document.getElementById('secPin').value,nu=document.getElementById('secUser').value.trim(),np=document.getElementById('secPass').value,npi=document.getElementById('secNewPin').value;if(!pin){showToast('Current PIN required','error');return}if(pin.length!==8){showToast('PIN must be 8 digits','error');return}var d={pin:pin};if(nu)d.new_username=nu;if(np)d.new_password=np;if(npi){if(npi.length!==8){showToast('New PIN must be 8 digits','error');return}d.new_pin=npi}if(!nu&&!np&&!npi){showToast('No changes','error');return}apiFetch('/admin/credentials',{method:'PUT',body:JSON.stringify(d)}).then(function(r){if(r.token){state.token=r.token;localStorage.setItem('maxaas_token',r.token)}showToast('Updated! Sign in with new credentials.','success');setTimeout(signOut,2000)}).catch(function(){})}

init();
</script>
</body>
</html>
