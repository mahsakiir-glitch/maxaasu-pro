<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maxaas.u | Premium Streaming</title>
  
  <!-- Premium Player -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: #141414;
      --accent: #e50914;
      --text-main: #ffffff;
      --text-muted: #8c8c8c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      -webkit-user-select: none; /* Prevent text selection */
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; width: 100%; padding: 20px 50px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }
    .logo { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
    .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 20px; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text-muted); }

    /* HERO SECTION */
    .hero {
      height: 90vh; position: relative;
      background-size: cover; background-position: center;
      display: flex; align-items: center; padding: 0 50px;
    }
    .hero::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; background: linear-gradient(to top, var(--bg-dark), transparent); }
    .hero-content { position: relative; z-index: 2; max-width: 600px; }
    .hero-title { font-size: 4rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.6); }
    .hero-desc { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 30px; }
    .btn-play { background: var(--accent); color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: 600; border-radius: 5px; cursor: pointer; transition: transform 0.2s, background 0.2s; }
    .btn-play:hover { transform: scale(1.05); background: #f40612; }

    /* CATEGORIES / SLIDER */
    .section { padding: 30px 50px; position: relative; z-index: 2; margin-top: -100px; }
    .section-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; }
    .slider { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scroll-behavior: smooth; scrollbar-width: none; }
    .slider::-webkit-scrollbar { display: none; }

    .card {
      min-width: 250px; height: 350px; border-radius: 8px; overflow: hidden;
      position: relative; cursor: pointer; transition: transform 0.3s ease, z-index 0.3s;
    }
    .card:hover { transform: scale(1.1); z-index: 10; }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    .card-info {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); opacity: 0; transition: opacity 0.3s;
    }
    .card:hover .card-info { opacity: 1; }

    /* VIDEO PLAYER MODAL */
    .player-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center;
    }
    .player-container { width: 90%; max-width: 1100px; position: relative; }
    .close-btn { position: absolute; top: -40px; right: 0; color: white; font-size: 2rem; cursor: pointer; z-index: 10000; }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 768px) {
      .navbar { padding: 15px 20px; }
      .hero { height: 70vh; padding: 0 20px; }
      .hero-title { font-size: 2.5rem; }
      .section { padding: 20px; margin-top: -50px; }
      .card { min-width: 150px; height: 220px; }
      .btn-play { padding: 12px 25px; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">MAXAAS.U</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Movies</a>
      <a href="#">Series</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero" style="background-image: url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop');">
    <div class="hero-content">
      <h1 class="hero-title">The Future of Streaming</h1>
      <p class="hero-desc">Watch securely anywhere. No URLs exposed. Premium quality.</p>
      <button class="btn-play" onclick="openPlayer('123e4567-e89b-12d3-a456-426614174000')">
        <i class="fas fa-play"></i> Watch Now
      </button>
    </div>
  </div>

  <!-- VIDEOS SLIDER -->
  <div class="section">
    <h2 class="section-title">Trending Now</h2>
    <div class="slider" id="videoSlider">
      <!-- Cards injected via JS -->
    </div>
  </div>

  <!-- SECURE PLAYER MODAL -->
  <div class="player-modal" id="playerModal">
    <div class="player-container">
      <div class="close-btn" onclick="closePlayer()"><i class="fas fa-times"></i></div>
      <div id="streamWrapper">
        <!-- Video tag or Iframe injected securely here -->
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script>
    /* ═══════════════════════════════════════
       SECURITY: Anti-Download & Anti-Inspect
       ═══════════════════════════════════════ */
    
    // Disable Right Click
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Disable Keyboard Shortcuts (F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S)
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123 || // F12
         (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
         (e.ctrlKey && e.keyCode === 85) || // Ctrl+U
         (e.ctrlKey && e.keyCode === 83)) { // Ctrl+S
        e.preventDefault();
        return false;
      }
    });

    // Anti-Drag for images/videos
    document.addEventListener('dragstart', e => {
      if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') e.preventDefault();
    });

    /* ═══════════════════════════════════════
       UI: DYNAMIC LOAD & SECURE STREAMING
       ═══════════════════════════════════════ */
    
    let player = null;

    // Fake Data Fetch (Replace with your /api/v1/videos call)
    async function loadVideos() {
      // const res = await fetch('/api/v1/videos');
      // const videos = await res.json();
      const videos = [
        { id: '1', title: 'Action Movie', thumbnail: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925&auto=format&fit=crop' },
        { id: '2', title: 'Drama Series', thumbnail: 'https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059&auto=format&fit=crop' }
      ];

      const slider = document.getElementById('videoSlider');
      videos.forEach(v => {
        slider.innerHTML += `
          <div class="card" onclick="openPlayer('${v.id}')">
            <img src="${v.thumbnail}" alt="${v.title}" draggable="false">
            <div class="card-info">
              <h3>${v.title}</h3>
            </div>
          </div>
        `;
      });
    }

    // SECURE PLAYER INITIALIZATION
    async function openPlayer(videoId) {
      const modal = document.getElementById('playerModal');
      const wrapper = document.getElementById('streamWrapper');
      
      // 1. Request Secure Token from Backend
      const res = await fetch(`/api/v1/videos/request-stream/${videoId}`, { method: 'POST' });
      const data = await res.json();

      if (data.type === 'youtube') {
        // YouTube Embed (No URL in source, uses nocookie domain)
        wrapper.innerHTML = `<div class="plyr__video-embed" id="player">
          <iframe src="${data.youtubeUrl}" allowfullscreen allowtransparency allow="autoplay"></iframe>
        </div>`;
      } else if (data.streamToken) {
        // Proxied Stream (Absolute security, URL is hidden behind token)
        wrapper.innerHTML = `<video id="player" playsinline controls></video>`;
        const video = document.querySelector('#player');
        video.src = `/api/v1/stream/${data.streamToken}`;
        
        // Initialize Plyr
        player = new Plyr(video, {
          controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
          settings: ['quality'],
          autoplay: true,
          keyboard: { focused: true, global: true }
        });

        // Security: Disable download button natively
        video.controlsList = 'nodownload';
      }

      modal.style.display = 'flex';
    }

    function closePlayer() {
      const modal = document.getElementById('playerModal');
      const wrapper = document.getElementById('streamWrapper');
      if (player) player.destroy(); // Destroy instance to stop stream
      wrapper.innerHTML = ''; // Clear DOM to remove stream traces
      modal.style.display = 'none';
    }

    // Init
    loadVideos();
  </script>
</body>
</html>
